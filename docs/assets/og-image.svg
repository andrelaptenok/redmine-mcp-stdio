<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.6" fill="#1C232E"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#0D1117"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- logo mark -->
  <g transform="translate(100,205) scale(0.43)">
    <g stroke="#8B949E" stroke-width="20" stroke-linecap="round">
      <line x1="256" y1="256" x2="403" y2="171"/>
      <line x1="256" y1="256" x2="109" y2="171"/>
      <line x1="256" y1="256" x2="256" y2="426"/>
    </g>
    <g fill="#E6EDF3">
      <circle cx="403" cy="171" r="34"/>
      <circle cx="109" cy="171" r="34"/>
      <circle cx="256" cy="426" r="34"/>
    </g>
    <polygon points="256,166 333.94,211 333.94,301 256,346 178.06,301 178.06,211"
             fill="#E5483C" stroke="#E5483C" stroke-width="36" stroke-linejoin="round"/>
    <circle cx="256" cy="256" r="30" fill="#0D1117"/>
  </g>

  <!-- title -->
  <text x="368" y="298" font-family="'DejaVu Sans Mono', Menlo, monospace" font-weight="bold" font-size="62" fill="#E6EDF3">redmine-mcp-stdio</text>
  <rect x="368" y="316" width="180" height="6" rx="3" fill="#E5483C"/>

  <!-- subtitle -->
  <text x="368" y="378" font-family="'DejaVu Sans Mono', Menlo, monospace" font-size="28" fill="#8B949E">MCP server for Redmine - issues, projects</text>
  <text x="368" y="418" font-family="'DejaVu Sans Mono', Menlo, monospace" font-size="28" fill="#8B949E">and time tracking, right from your editor</text>

  <!-- clients -->
  <text x="368" y="490" font-family="'DejaVu Sans Mono', Menlo, monospace" font-size="23" fill="#6E7681">Cursor · VS Code · Claude · Zed · JetBrains · Windsurf</text>

  <!-- bottom accent -->
  <rect x="0" y="622" width="1200" height="8" fill="#E5483C"/>
</svg>
