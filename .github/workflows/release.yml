name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm publish --provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - run: npm ci
      - run: npm run check

      - name: Detect npm token
        id: npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: echo "present=${NPM_TOKEN:+yes}" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.npm.outputs.present == 'yes'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip npm publish (no NPM_TOKEN)
        if: steps.npm.outputs.present != 'yes'
        run: echo "::notice::NPM_TOKEN is not set — skipping npm publish. Add the secret to enable it."

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag
